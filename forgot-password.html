<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نسيت كلمة المرور</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/forgot-password.css">

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="script/forgot-password.js" defer></script>
</head>

<body>

<div class="bg-canvas"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="particles" id="particles"></div>

<div class="card">

  <div class="lock-wrap">
    <div class="lock-icon" id="lockIcon">🔐</div>
  </div>

  <div class="title" id="mainTitle">
    نسيت كلمة المرور؟
  </div>

  <div class="subtitle" id="mainSub">
    لا تقلق! هنساعدك تسترجع حسابك في ثواني
  </div>

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="s1"></div>
    <div class="step" id="s2"></div>
    <div class="step" id="s3"></div>
  </div>

  <!-- =========================
       PANEL 1
  ========================== -->

  <div class="panel active" id="panel1">

    <div class="input-group">

      <label>📬 البريد الإلكتروني</label>

      <div class="input-wrap">

        <input
          type="email"
          id="emailInput"
          placeholder="example@email.com"
          dir="ltr"
        >

        <span class="input-icon">✉️</span>

      </div>

    </div>

    <button class="btn" onclick="goToStep2()">
      <span class="btn-text">
        إرسال كود التحقق
      </span>
    </button>

    <div class="helper">

      تذكرت كلمة المرور؟

      <a href="login-register.html?mode=login">
        سجّل دخول
      </a>

    </div>

  </div>

  <!-- =========================
       PANEL 2
  ========================== -->

  <div class="panel" id="panel2">

    <div class="timer">
      الكود ينتهي خلال
      <span id="countdown">02:00</span>
    </div>

    <div class="otp-wrap">

      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-input" maxlength="1" type="text" inputmode="numeric">

    </div>

    <button class="btn" onclick="goToStep3()">

      <span class="btn-text">
        تحقق من الكود ✓
      </span>

    </button>

    <div class="helper">

      ما وصلك الكود؟

      <button
        class="resend-btn"
        id="resendBtn"
        onclick="resendCode()"
      >
        أعد الإرسال
      </button>

    </div>

  </div>

  <!-- =========================
       PANEL 3
  ========================== -->

  <div class="panel" id="panel3">

    <div class="input-group">

      <label>🔒 كلمة المرور الجديدة</label>

      <div class="input-wrap">

        <input
          type="password"
          id="pass1"
          placeholder="أدخل كلمة مرور قوية"
          oninput="checkStrength(this.value)"
        >

        <span class="input-icon">🔑</span>

      </div>

      <div class="strength-bar">
        <div class="strength-fill" id="strengthFill"></div>
      </div>

      <div class="strength-label" id="strengthLabel"></div>

    </div>

    <div class="input-group">

      <label>🔁 تأكيد كلمة المرور</label>

      <div class="input-wrap">

        <input
          type="password"
          id="pass2"
          placeholder="أعد إدخال كلمة المرور"
        >

        <span class="input-icon">🔑</span>

      </div>

    </div>

    <button class="btn" onclick="finish()">

      <span class="btn-text">
        تغيير كلمة المرور 🚀
      </span>

    </button>

  </div>

</div>

</body>
</html>
