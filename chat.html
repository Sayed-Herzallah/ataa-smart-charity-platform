<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات الذكاء الاصطناعي | عطاء</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* ── Chat Layout ── */
        .chat-wrapper {
            padding-top: 88px;
            min-height: 100vh;
            background: var(--neutral-50);
            display: flex;
            justify-content: center;
        }
        .chat-container {
            width: 100%;
            max-width: 960px;
            height: calc(100vh - 120px);
            background: var(--white);
            border-radius: var(--r-lg);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 16px 16px 32px;
        }

        /* ── Messages Area ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }
        .message {
            max-width: 78%;
            animation: fadeUp 0.35s cubic-bezier(.2,.8,.2,1);
        }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; }
        
        .message-content {
            padding: 12px 16px;
            border-radius: var(--r-md);
            font-size: 15px;
            line-height: 1.7;
            word-wrap: break-word;
        }
        .message.ai .message-content {
            background: var(--neutral-50);
            color: var(--neutral-800);
            border: 1px solid var(--neutral-200);
            border-top-right-radius: 4px;
        }
        .message.user .message-content {
            background: var(--teal-600);
            color: var(--white);
            border-bottom-left-radius: 4px;
        }

        /* ── Input Area ── */
        .chat-input-area {
            padding: 18px 24px 24px;
            border-top: 1px solid var(--neutral-200);
            background: var(--white);
        }
        .chat-form { position: relative; }
        .input-wrapper {
            display: flex;
            align-items: flex-end;
            background: var(--neutral-50);
            border: 1.5px solid var(--neutral-200);
            border-radius: var(--r-lg);
            padding: 8px 8px 8px 16px;
            transition: border-color .25s, box-shadow .25s;
        }
        .input-wrapper:focus-within {
            border-color: var(--teal-400);
            box-shadow: 0 0 0 3px rgba(94,192,203,.15);
        }
        #chatInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-family: var(--font);
            font-size: 15px;
            color: var(--neutral-800);
            resize: none;
            max-height: 140px;
            padding: 8px 0;
            line-height: 1.5;
        }
        #chatInput::placeholder { color: var(--neutral-400); }
        
        .send-btn {
            width: 44px; height: 44px;
            border-radius: var(--r-md);
            background: var(--teal-600);
            color: var(--white);
            display: flex; align-items: center; justify-content: center;
            transition: all .25s ease;
            margin-right: 6px;
        }
        .send-btn:hover { background: var(--teal-700); transform: translateY(-2px); box-shadow: var(--shadow-teal); }
        .send-btn:disabled { background: var(--neutral-200); cursor: not-allowed; transform: none; box-shadow: none; }
        
        .chat-hint {
            font-size: 12px;
            color: var(--neutral-400);
            text-align: center;
            margin-top: 12px;
        }
        .chat-hint span { color: var(--gold-500); font-weight: 600; }

        /* ── Typing Animation ── */
        @keyframes bounceDot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .typing-dots { display: flex; gap: 6px; align-items: center; padding: 4px 0; }
        .typing-dots span {
            width: 8px; height: 8px; background: var(--neutral-400);
            border-radius: 50%; animation: bounceDot 0.6s infinite alternate;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        /* ── Custom Scrollbar ── */
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--neutral-200); border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb:hover { background: var(--neutral-400); }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .chat-wrapper { padding-top: 80px; }
            .chat-container { height: calc(100vh - 100px); margin: 10px 0; border-radius: 0; box-shadow: none; border-top: 1px solid var(--neutral-200); }
            .chat-messages { padding: 16px; gap: 14px; }
            .chat-input-area { padding: 14px 16px 20px; }
            .message { max-width: 88%; }
            .input-wrapper { padding: 6px 6px 6px 12px; }
        }
    </style>
</head>
<body>
    <!-- Navbar (يستخدم نفس كلاسات main.css) -->
    <nav class="navbar">
        <div class="nav-inner">
            <div class="nav-logo">
                <div class="nav-logo-mark">ع</div>
                <span class="nav-logo-text">عطاء</span>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="nav-btn-login">العودة للرئيسية</a>
            </div>
        </div>
    </nav>

    <!-- Main Chat Area -->
    <main class="chat-wrapper">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <div class="message-content">أهلاً بك في مساعد عطاء الذكي! 👋<br>كيف يمكنني مساعدتك اليوم؟</div>
                </div>
            </div>

            <div class="chat-input-area">
                <form id="chatForm" class="chat-form">
                    <div class="input-wrapper">
                        <textarea id="chatInput" placeholder="اكتب رسالتك هنا..." rows="1" required></textarea>
                        <button type="submit" class="send-btn" aria-label="إرسال">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </form>
                <p class="chat-hint">المساعد قد يرتكب أخطاء. يرجى <span>التحقق من المعلومات الهامة</span>.</p>
            </div>
        </div>
    </main>


</body>
</html>
