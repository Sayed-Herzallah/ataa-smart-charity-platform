<nav class="navbar" id="navbar">
    <div class="nav-inner">

        <!-- Logo -->
        <a href="index.html" class="nav-logo" style="height: 50px;">
            <img src="images/logo.png"
                alt="logo"
                class="logo-img">
        </a>


        <!-- Links -->
        <div class="nav-links">
            <a href="index.html">الرئيسية</a>

            <a href="charity.html">
                الجمعيات
            </a>

            <a href="ai-chat.html">

            </a>
        </div>

        <!-- Logged In Actions -->
        <div class="nav-actions"  id="navActions">

            <!-- Notification Dropdown -->
            <div class="dropdown me-3">
                <button class="btn p-0 border-0 position-relative" type="button" id="notificationsDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="background: transparent;">
                    <i class="fa-solid fa-bell fs-5" style="color: #1b4b5a;"></i>
                    <span id="notifications-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 9px; padding: 2px 4px;">0</span>
                </button>
                <ul class="dropdown-menu dropdown-menu-end shadow p-2" id="notifications-list" aria-labelledby="notificationsDropdown" style="width: 300px; max-height: 350px; overflow-y: auto; border-radius: 12px; border: none; font-size: 13px;">
                    <li class="text-center text-muted p-3">جاري تحميل الإشعارات...</li>
                </ul>
            </div>

            <a href="settings.html"
                class="settings-btn"
                title="الإعدادات">

                <i class="fa-solid fa-gear"></i>
            </a>

                class="nav-btn-login">

            </button>

            id="hamBtn">

            <span></span>

<!-- ══════ MOBILE MENU ══════ -->

    </a>

        class="nav-btn-login">
        ⚙️ الإعدادات
    </a>

    <button id="mobileLogoutBtn"
        class="nav-btn-signup"
        style="width:100%; margin-top:10px;">
        تسجيل خروج
    </button>

</div>

<div class="my-dashboard">
  <div class="container mt-4">
    <h4 class="fw-bold px-2 mb-4">لوحة تحكم الجمعية</h4>
    
    <!-- Stats Cards Grid -->
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="stat-card stat-total">
          <div class="stat-icon"><i class="fa-solid fa-box-open"></i></div>
          <div class="stat-info">
            <p>إجمالي التبرعات</p>
            <h4 id="total-donations">0</h4>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card stat-pending">
          <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
          <div class="stat-info">
            <p>تبرعات معلقة</p>
            <h4 id="pending-donations">0</h4>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card stat-accepted">
          <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
          <div class="stat-info">
            <p>تبرعات مقبولة</p>
            <h4 id="accepted-donations">0</h4>
          </div>
        </div>
      </div>
    </div>



    <!-- Donations Full Width Grid Card -->
    <div class="row g-4">
      <div class="col-12">
        <div class="card shadow-sm p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold">التبرعات الجديدة</h5>
          </div>
          
          <!-- Grid container -->
          <div id="donations-grid" class="donations-grid">
            <!-- Dynamically populated -->
          </div>

          <!-- Pagination container -->
          <div class="pagination-container d-flex justify-content-center align-items-center gap-3">
            <button id="prevPageBtn" class="btn btn-outline-teal" onclick="changePage(-1)">السابق</button>
            <span id="pageIndicator" class="fw-bold">الصفحة 1</span>
            <button id="nextPageBtn" class="btn btn-outline-teal" onclick="changePage(1)">التالي</button>
          </div>
        </div>
      </div>
    </div>

  </div> <!-- End container -->
</div> <!-- End my-dashboard -->


















<!-- Donation Details Modal -->
<div class="modal fade" id="donationDetailsModal" tabindex="-1" aria-labelledby="donationDetailsModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content" style="border-radius: 20px; border: none; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
      <div class="modal-header text-white" style="background: linear-gradient(135deg, #1b4b5a 0%, #2e8e98 100%); border-bottom: none; padding: 20px;">
        <h5 class="modal-title fw-bold" id="donationDetailsModalLabel"><i class="fa-solid fa-circle-info me-2"></i> تفاصيل التبرع بالكامل</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body p-4" id="donationDetailsBody">
        <!-- Dynamically populated -->
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script/charity.js"></script>

</body>
</html>
